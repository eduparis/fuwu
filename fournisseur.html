<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuwu.fr — Espace Fournisseur</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--surface3:#242840;
  --border:#2a2f45;--accent:#c8a96e;--accent2:#e8c98e;--text:#e8e6e1;
  --muted:#6b7280;--danger:#ef4444;--success:#22c55e;--warning:#f59e0b;
  --info:#3b82f6;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

/* ── SELECT SCREEN ── */
#select-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
#select-screen::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(200,169,110,0.06),transparent 70%);top:-150px;right:-150px;}
.select-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px;width:100%;max-width:480px;position:relative;z-index:1;}
.select-logo{font-family:'Playfair Display',serif;font-size:26px;color:var(--accent);margin-bottom:4px;}
.select-sub{color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.select-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.fournisseur-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;max-height:400px;overflow-y:auto;}
.fournisseur-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px 20px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:14px;}
.fournisseur-card:hover{border-color:var(--accent);background:var(--surface3);}
.fournisseur-card.selected{border-color:var(--accent);background:rgba(200,169,110,0.08);box-shadow:0 0 0 1px var(--accent);}
.fc-icon{width:40px;height:40px;border-radius:10px;background:rgba(200,169,110,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.fc-name{font-weight:600;font-size:14px;}
.fc-email{font-size:11px;color:var(--muted);margin-top:2px;}
.select-btn{width:100%;background:var(--accent);color:#0f1117;border:none;border-radius:10px;padding:14px;font-family:'Playfair Display',serif;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.select-btn:hover:not(:disabled){background:var(--accent2);transform:translateY(-1px);}
.select-btn:disabled{opacity:0.4;cursor:not-allowed;}
.select-error{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:11px;color:#fca5a5;font-size:13px;margin-top:14px;display:none;text-align:center;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top:2px solid var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DASHBOARD ── */
#dashboard{display:none;min-height:100vh;}
.topbar{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:50;}
.topbar-left{display:flex;align-items:center;gap:16px;}
.topbar-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#0f1117;}
.topbar-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--text);}
.topbar-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.topbar-actions{display:flex;gap:10px;}
.btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.15s;}
.btn:hover{border-color:var(--accent);background:var(--surface3);}
.btn-accent{background:var(--accent);color:#0f1117;border-color:var(--accent);}
.btn-accent:hover{background:var(--accent2);}
.btn-danger{color:var(--danger);border-color:rgba(239,68,68,0.3);}
.btn-danger:hover{background:rgba(239,68,68,0.1);}

.content{padding:28px 32px;max-width:1200px;margin:0 auto;}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 24px;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent-line,var(--border));}
.stat-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.stat-value{font-size:28px;font-weight:700;font-family:'Playfair Display',serif;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.green{color:var(--success);}
.orange{color:var(--warning);}
.red{color:var(--danger);}
.blue{color:var(--info);}

/* Filters */
.filter-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.filter-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s;}
.filter-input:focus{border-color:var(--accent);}
.filter-input::placeholder{color:var(--muted);}
select.filter-input{cursor:pointer;}

/* Table */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.data-table{width:100%;border-collapse:collapse;}
.data-table th{background:var(--surface2);padding:12px 16px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;}
.data-table td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
.data-table tbody tr{transition:background 0.1s;}
.data-table tbody tr:hover{background:var(--surface2);}
.data-table tbody tr:last-child td{border-bottom:none;}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-attente{background:rgba(245,158,11,0.12);color:var(--warning);}
.badge-traitement{background:rgba(59,130,246,0.12);color:var(--info);}
.badge-actif{background:rgba(34,197,94,0.12);color:var(--success);}
.badge-annule,.badge-refuse{background:rgba(239,68,68,0.12);color:var(--danger);}
.badge-termine{background:rgba(107,114,128,0.12);color:var(--muted);}
.badge-valide{background:rgba(34,197,94,0.12);color:var(--success);}

/* Action buttons in table */
.action-btn{padding:4px 10px;border-radius:6px;border:none;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
.action-btn.validate{background:rgba(34,197,94,0.12);color:var(--success);border:1px solid rgba(34,197,94,0.25);}
.action-btn.validate:hover{background:rgba(34,197,94,0.25);}
.action-btn.refuse{background:rgba(239,68,68,0.12);color:var(--danger);border:1px solid rgba(239,68,68,0.25);}
.action-btn.refuse:hover{background:rgba(239,68,68,0.25);}

/* Detail modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;position:relative;}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.modal-close:hover{color:var(--text);}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px;padding-right:30px;}
.detail-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.detail-value{text-align:right;font-weight:500;}

/* Pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:20px;}
.pagination button{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;cursor:pointer;transition:all 0.15s;}
.pagination button:hover:not(:disabled){border-color:var(--accent);}
.pagination button:disabled{opacity:0.3;cursor:not-allowed;}
.pagination span{font-size:12px;color:var(--muted);}

/* Toast */
.toast{position:fixed;top:20px;right:20px;background:var(--surface);border:1px solid var(--success);border-radius:10px;padding:12px 20px;font-size:13px;color:var(--success);z-index:999;transform:translateX(120%);transition:transform 0.3s ease;}
.toast.show{transform:translateX(0);}
.toast.error{border-color:var(--danger);color:var(--danger);}

/* Checkbox */
.cb{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;}

/* Responsive */
@media(max-width:768px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .content{padding:16px;}
  .topbar{padding:16px;}
  .filter-bar{flex-direction:column;}
  .select-box{margin:16px;padding:32px;}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- ── FOURNISSEUR SELECT SCREEN ── -->
<div id="select-screen">
  <div class="select-box">
    <div class="select-logo">Fuwu.fr</div>
    <div class="select-sub">Espace Fournisseur</div>
    <div class="select-label">Sélectionnez votre entreprise</div>
    <div class="fournisseur-grid" id="fournisseur-list">
      <div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">
        <span class="spinner"></span> Chargement des fournisseurs…
      </div>
    </div>
    <button class="select-btn" id="select-btn" disabled onclick="enterDashboard()">Accéder</button>
    <div class="select-error" id="select-error"></div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-avatar" id="f-avatar">E</div>
      <div>
        <div class="topbar-title" id="f-name">—</div>
        <div class="topbar-sub" id="f-email">—</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn" onclick="exportCSV()">📥 Exporter CSV</button>
      <button class="btn btn-danger" onclick="doLogout()">Déconnexion</button>
    </div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card" style="--accent-line:var(--info)">
        <div class="stat-label">Total contrats</div>
        <div class="stat-value blue" id="stat-total">—</div>
        <div class="stat-sub">tous statuts</div>
      </div>
      <div class="stat-card" style="--accent-line:var(--warning)">
        <div class="stat-label">En attente</div>
        <div class="stat-value orange" id="stat-attente">—</div>
        <div class="stat-sub">à valider</div>
      </div>
      <div class="stat-card" style="--accent-line:var(--success)">
        <div class="stat-label">Validés</div>
        <div class="stat-value green" id="stat-valide">—</div>
        <div class="stat-sub">confirmés</div>
      </div>
      <div class="stat-card" style="--accent-line:var(--danger)">
        <div class="stat-label">Refusés</div>
        <div class="stat-value red" id="stat-refuse">—</div>
        <div class="stat-sub">rejetés</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <input type="text" class="filter-input" id="search" placeholder="🔍 Rechercher nom, email, PDL…" oninput="applyFilters()" style="flex:1;min-width:200px;">
      <select class="filter-input" id="filter-status" onchange="applyFilters()">
        <option value="">Tous statuts</option>
        <option value="en_attente">En attente</option>
        <option value="en_traitement">En traitement</option>
        <option value="actif">Actif</option>
        <option value="annule">Annulé</option>
        <option value="refuse">Refusé</option>
      </select>
      <select class="filter-input" id="filter-energie" onchange="applyFilters()">
        <option value="">Toutes énergies</option>
        <option value="elec">Électricité</option>
        <option value="gaz">Gaz</option>
        <option value="elec+gaz">Élec + Gaz</option>
      </select>
      <div style="margin-left:auto;display:flex;align-items:center;gap:8px;" id="batch-actions" hidden>
        <span style="font-size:12px;color:var(--accent);" id="batch-count">0 sélectionnés</span>
        <button class="action-btn validate" onclick="batchAction('actif')">✅ Valider</button>
        <button class="action-btn refuse" onclick="batchAction('refuse')">❌ Refuser</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th><input type="checkbox" class="cb" id="select-all" onchange="toggleSelectAll()"></th>
            <th>Client</th>
            <th>Énergie</th>
            <th>PDL / PCE</th>
            <th>Statut</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="7" style="padding:40px;text-align:center;color:var(--muted)"><span class="spinner"></span> Chargement…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </div>
</div>

<!-- ── DETAIL MODAL ── -->
<div class="modal-overlay" id="modal-detail" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script src="common.js"></script>
<script>
// ── State ──
let currentFournisseur = null;
let allContrats = [];
let filteredContrats = [];
let personnesMap = {};
let adressesMap = {};
let selectedIds = new Set();
let currentPage = 1;
const PAGE_SIZE = 20;

// ── Init: load fournisseurs list ──
(async function init() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/fournisseurs?select=id,nom,contact_nom,contact_email,actif&actif=eq.true&order=nom.asc`, { headers: fuwuHA() });
    const data = await r.json();
    const grid = document.getElementById('fournisseur-list');
    if (!data || !data.length) {
      grid.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">Aucun fournisseur trouvé.</div>';
      return;
    }
    grid.innerHTML = data.map(f => `
      <div class="fournisseur-card" data-id="${f.id}" onclick="selectFournisseur(this,'${f.id}')">
        <div class="fc-icon">${f.nom.charAt(0).toUpperCase()}</div>
        <div>
          <div class="fc-name">${esc(f.nom)}</div>
          <div class="fc-email">${esc(f.contact_email || f.contact_nom || '—')}</div>
        </div>
      </div>
    `).join('');
  } catch (e) {
    document.getElementById('fournisseur-list').innerHTML = `<div style="padding:20px;color:var(--danger);font-size:13px;">Erreur: ${esc(e.message)}</div>`;
  }
})();

function selectFournisseur(el, id) {
  document.querySelectorAll('.fournisseur-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  currentFournisseur = { id };
  document.getElementById('select-btn').disabled = false;
}

async function enterDashboard() {
  if (!currentFournisseur) return;
  const btn = document.getElementById('select-btn');
  btn.textContent = 'Chargement…'; btn.disabled = true;
  try {
    // Load fournisseur details
    const rf = await fetch(`${SUPABASE_URL}/rest/v1/fournisseurs?id=eq.${currentFournisseur.id}&select=*`, { headers: fuwuHA() });
    const fd = await rf.json();
    if (!fd || !fd.length) throw new Error('Fournisseur introuvable');
    currentFournisseur = fd[0];

    // Update header
    document.getElementById('f-name').textContent = currentFournisseur.nom;
    document.getElementById('f-email').textContent = currentFournisseur.contact_email || '';
    document.getElementById('f-avatar').textContent = currentFournisseur.nom.charAt(0).toUpperCase();

    // Switch screens
    document.getElementById('select-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    await loadContrats();
  } catch (e) {
    showSelectError(e.message);
    btn.textContent = 'Accéder'; btn.disabled = false;
  }
}

function showSelectError(msg) {
  const el = document.getElementById('select-error');
  el.textContent = msg; el.style.display = 'block';
}

function doLogout() {
  currentFournisseur = null;
  allContrats = []; filteredContrats = [];
  personnesMap = {}; adressesMap = {};
  selectedIds.clear();
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('select-screen').style.display = 'flex';
  document.querySelectorAll('.fournisseur-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('select-btn').disabled = true;
  document.getElementById('select-btn').textContent = 'Accéder';
}

// ── Load contrats for this fournisseur ──
async function loadContrats() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '<tr><td colspan="7" style="padding:40px;text-align:center;color:var(--muted)"><span class="spinner"></span> Chargement…</td></tr>';

  try {
    // Fetch contrats matching this fournisseur (by nom)
    const fname = encodeURIComponent(currentFournisseur.nom);
    const r = await fetch(
      `${SUPABASE_URL}/rest/v1/contrats?fournisseur=ilike.${fname}&select=id,id_service,id_fournisseur,fournisseur,energie_type,contrat_status,date_debut,created_at,personne_id,adresse_id,formule,option_tarifaire,iban,source&order=created_at.desc`,
      { headers: fuwuHA() }
    );
    allContrats = await r.json();
    if (!Array.isArray(allContrats)) allContrats = [];

    // Batch-load personnes
    const pIds = [...new Set(allContrats.map(c => c.personne_id).filter(Boolean))];
    if (pIds.length) {
      const rp = await fetch(`${SUPABASE_URL}/rest/v1/personnes?id=in.(${pIds.join(',')})&select=id,civilite,prenom,nom,email,telephone`, { headers: fuwuHA() });
      const pd = await rp.json();
      if (Array.isArray(pd)) pd.forEach(p => personnesMap[p.id] = p);
    }

    // Batch-load adresses
    const aIds = [...new Set(allContrats.map(c => c.adresse_id).filter(Boolean))];
    if (aIds.length) {
      const ra = await fetch(`${SUPABASE_URL}/rest/v1/adresses?id=in.(${aIds.join(',')})&select=id,rue,ville,code_postal,pdl,pce`, { headers: fuwuHA() });
      const ad = await ra.json();
      if (Array.isArray(ad)) ad.forEach(a => adressesMap[a.id] = a);
    }

    applyFilters();
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="7" style="padding:20px;color:var(--danger)">${esc(e.message)}</td></tr>`;
  }
}

// ── Filters ──
function applyFilters() {
  const search = (document.getElementById('search').value || '').toLowerCase();
  const status = document.getElementById('filter-status').value;
  const energie = document.getElementById('filter-energie').value;

  filteredContrats = allContrats.filter(c => {
    if (status && c.contrat_status !== status) return false;
    if (energie && c.energie_type !== energie) return false;
    if (search) {
      const p = personnesMap[c.personne_id] || {};
      const a = adressesMap[c.adresse_id] || {};
      const hay = [p.prenom, p.nom, p.email, a.pdl, a.pce, a.ville, c.id_service, c.id_fournisseur].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  currentPage = 1;
  selectedIds.clear();
  updateStats();
  renderTable();
}

function updateStats() {
  document.getElementById('stat-total').textContent = allContrats.length;
  document.getElementById('stat-attente').textContent = allContrats.filter(c => c.contrat_status === 'en_attente' || c.contrat_status === 'en_traitement').length;
  document.getElementById('stat-valide').textContent = allContrats.filter(c => c.contrat_status === 'actif').length;
  document.getElementById('stat-refuse').textContent = allContrats.filter(c => c.contrat_status === 'refuse' || c.contrat_status === 'annule').length;
}

// ── Render table ──
function renderTable() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filteredContrats.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('table-body');

  if (!page.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="padding:40px;text-align:center;color:var(--muted)">Aucun contrat trouvé.</td></tr>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  tbody.innerHTML = page.map(c => {
    const p = personnesMap[c.personne_id] || {};
    const a = adressesMap[c.adresse_id] || {};
    const name = [p.prenom, p.nom].filter(Boolean).join(' ') || p.email || '—';
    const pdlpce = [a.pdl, a.pce].filter(Boolean).join(' / ') || '—';
    const canAct = c.contrat_status === 'en_attente' || c.contrat_status === 'en_traitement';
    const checked = selectedIds.has(c.id) ? 'checked' : '';

    return `<tr>
      <td><input type="checkbox" class="cb" ${checked} onchange="toggleSelect('${c.id}')" ${canAct ? '' : 'disabled'}></td>
      <td>
        <div style="font-weight:600;font-size:13px;cursor:pointer;" onclick="showDetail('${c.id}')">${esc(name)}</div>
        <div style="font-size:11px;color:var(--muted)">${esc(p.email || '')}</div>
      </td>
      <td>${energieLabel(c.energie_type)}</td>
      <td style="font-family:monospace;font-size:12px;">${esc(pdlpce)}</td>
      <td>${statusBadge(c.contrat_status)}</td>
      <td style="font-size:12px;color:var(--muted)">${fmtDate(c.date_debut || c.created_at)}</td>
      <td>
        ${canAct ? `
          <button class="action-btn validate" onclick="updateStatus('${c.id}','actif')" title="Valider">✅</button>
          <button class="action-btn refuse" onclick="updateStatus('${c.id}','refuse')" title="Refuser">❌</button>
        ` : '—'}
      </td>
    </tr>`;
  }).join('');

  // Pagination
  const totalPages = Math.ceil(filteredContrats.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  pg.innerHTML = `
    <button ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">←</button>
    <span>${currentPage} / ${totalPages}</span>
    <button ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">→</button>
  `;

  updateBatchUI();
}

function goPage(n) { currentPage = n; renderTable(); }

// ── Selection ──
function toggleSelect(id) {
  if (selectedIds.has(id)) selectedIds.delete(id);
  else selectedIds.add(id);
  updateBatchUI();
}

function toggleSelectAll() {
  const checked = document.getElementById('select-all').checked;
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filteredContrats.slice(start, start + PAGE_SIZE);
  page.forEach(c => {
    if (c.contrat_status === 'en_attente' || c.contrat_status === 'en_traitement') {
      if (checked) selectedIds.add(c.id); else selectedIds.delete(c.id);
    }
  });
  renderTable();
}

function updateBatchUI() {
  const el = document.getElementById('batch-actions');
  const cnt = document.getElementById('batch-count');
  if (selectedIds.size > 0) {
    el.hidden = false;
    cnt.textContent = `${selectedIds.size} sélectionné${selectedIds.size > 1 ? 's' : ''}`;
  } else {
    el.hidden = true;
  }
}

// ── Actions: validate / refuse ──
async function updateStatus(id, newStatus) {
  const label = newStatus === 'actif' ? 'valider' : 'refuser';
  if (!confirm(`Confirmer : ${label} ce contrat ?`)) return;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/contrats?id=eq.${id}`, {
      method: 'PATCH', headers: fuwuHA(), body: JSON.stringify({ contrat_status: newStatus })
    });
    if (!r.ok) throw new Error(await r.text());
    // Update local
    const c = allContrats.find(x => x.id === id);
    if (c) c.contrat_status = newStatus;
    selectedIds.delete(id);
    applyFilters();
    showToast(newStatus === 'actif' ? 'Contrat validé ✅' : 'Contrat refusé ❌');
  } catch (e) { showToast('Erreur: ' + e.message, true); }
}

async function batchAction(newStatus) {
  const ids = [...selectedIds];
  if (!ids.length) return;
  const label = newStatus === 'actif' ? 'valider' : 'refuser';
  if (!confirm(`${label.charAt(0).toUpperCase() + label.slice(1)} ${ids.length} contrat(s) ?`)) return;
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/contrats?id=in.(${ids.join(',')})`, {
      method: 'PATCH', headers: fuwuHA(), body: JSON.stringify({ contrat_status: newStatus })
    });
    if (!r.ok) throw new Error(await r.text());
    ids.forEach(id => {
      const c = allContrats.find(x => x.id === id);
      if (c) c.contrat_status = newStatus;
    });
    selectedIds.clear();
    applyFilters();
    showToast(`${ids.length} contrat(s) ${newStatus === 'actif' ? 'validé(s)' : 'refusé(s)'}`);
  } catch (e) { showToast('Erreur: ' + e.message, true); }
}

// ── Detail modal ──
function showDetail(id) {
  const c = allContrats.find(x => x.id === id);
  if (!c) return;
  const p = personnesMap[c.personne_id] || {};
  const a = adressesMap[c.adresse_id] || {};
  const name = [p.civilite, p.prenom, p.nom].filter(Boolean).join(' ');

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-title">Détail du contrat</div>
    ${row('ID Fuwu', c.id_service || '—')}
    ${row('ID Fournisseur', c.id_fournisseur || '—')}
    ${row('Statut', statusBadge(c.contrat_status))}
    <div style="height:12px"></div>
    <div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Client</div>
    ${row('Nom', esc(name || '—'))}
    ${row('Email', esc(p.email || '—'))}
    ${row('Téléphone', esc(p.telephone || '—'))}
    <div style="height:12px"></div>
    <div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Contrat</div>
    ${row('Énergie', energieLabel(c.energie_type))}
    ${row('Formule', c.formule || '—')}
    ${row('Option tarifaire', c.option_tarifaire || '—')}
    ${row('Date début', fmtDate(c.date_debut))}
    <div style="height:12px"></div>
    <div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Adresse</div>
    ${row('Rue', esc(a.rue || '—'))}
    ${row('Ville', esc([a.code_postal, a.ville].filter(Boolean).join(' ') || '—'))}
    ${row('PDL', a.pdl || '—')}
    ${row('PCE', a.pce || '—')}
    ${(c.contrat_status === 'en_attente' || c.contrat_status === 'en_traitement') ? `
      <div style="display:flex;gap:10px;margin-top:24px;">
        <button class="btn btn-accent" onclick="updateStatus('${c.id}','actif');closeModal();">✅ Valider</button>
        <button class="btn btn-danger" onclick="updateStatus('${c.id}','refuse');closeModal();">❌ Refuser</button>
      </div>
    ` : ''}
  `;
  document.getElementById('modal-detail').style.display = 'flex';
}

function closeModal() { document.getElementById('modal-detail').style.display = 'none'; }

// ── Export CSV ──
function exportCSV() {
  const headers = ['ID Fuwu','ID Fournisseur','Client','Email','Énergie','Statut','Date début','PDL','PCE','Ville'];
  const rows = filteredContrats.map(c => {
    const p = personnesMap[c.personne_id] || {};
    const a = adressesMap[c.adresse_id] || {};
    return [
      c.id_service || '', c.id_fournisseur || '',
      [p.prenom, p.nom].filter(Boolean).join(' '), p.email || '',
      c.energie_type || '', c.contrat_status || '',
      c.date_debut || '', a.pdl || '', a.pce || '', a.ville || ''
    ].map(v => `"${(v+'').replace(/"/g,'""')}"`).join(',');
  });
  const csv = '\uFEFF' + headers.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${currentFournisseur.nom.replace(/\s+/g,'_')}_contrats_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exporté ✓');
}

// ── Helpers ──
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('fr-FR'); }
function row(label, value) { return `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${value}</span></div>`; }

function statusBadge(s) {
  const map = {
    en_attente: ['En attente', 'badge-attente'],
    en_traitement: ['En traitement', 'badge-traitement'],
    actif: ['Actif', 'badge-actif'],
    annule: ['Annulé', 'badge-annule'],
    refuse: ['Refusé', 'badge-refuse'],
    termine: ['Terminé', 'badge-termine'],
  };
  const [label, cls] = map[s] || [s || '—', ''];
  return `<span class="badge ${cls}">${label}</span>`;
}

function energieLabel(t) {
  const m = { elec: '⚡ Élec', gaz: '🔥 Gaz', 'elec+gaz': '⚡🔥 Dual' };
  return m[t] || t || '—';
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}
</script>
